trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: 'nishanth'
  demands:
    - agent.name -equals nishanthho

variables:
  NODE_VERSION: '20.x'
  CLIENT_DIR: 'client'
  SERVER_DIR: 'server'
  ARTIFACT_NAME: 'chat-app-artifact'
  OWASP_REPORT_DIR: '$(Build.ArtifactStagingDirectory)/owasp-report'
  SONARQUBE_SERVICE_CONNECTION: 'Your-SonarQube-Service-Connection'
  SONAR_PROJECT_KEY: 'chat-app'
  SONAR_PROJECT_NAME: 'chat-app'
  JAVA_HOME: 'C:\Program Files\Java\jdk-21'

stages:
- stage: Build
  displayName: Build client and server
  jobs:
  - job: InstallAndBuild
    displayName: Install and build
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '$(NODE_VERSION)'
      displayName: Use Node.js $(NODE_VERSION)

    - powershell: |
        if (-not (Test-Path "$(JAVA_HOME)\bin\java.exe")) {
          throw "Java not found at $(JAVA_HOME). Install JDK 21 on the agent or update JAVA_HOME."
        }

        Write-Host "JAVA_HOME = $(JAVA_HOME)"
        Write-Host "##vso[task.setvariable variable=JAVA_HOME]$(JAVA_HOME)"
        Write-Host "##vso[task.prependpath]$(JAVA_HOME)\bin"
        & "$(JAVA_HOME)\bin\java.exe" -version
      displayName: Set Java 21

    - task: SonarQubePrepare@7
      inputs:
        SonarQube: '$(SONARQUBE_SERVICE_CONNECTION)'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '$(SONAR_PROJECT_KEY)'
        cliProjectName: '$(SONAR_PROJECT_NAME)'
        cliSources: 'client/src,server'
        extraProperties: |
          sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
          sonar.sourceEncoding=UTF-8
      displayName: Prepare SonarQube analysis

    - powershell: |
        Write-Host "Installing and building client..."
        Set-Location $(CLIENT_DIR)
        if (Test-Path package-lock.json) { npm ci } else { npm install }
        npm run build
      displayName: Install & build client

    - powershell: |
        Write-Host "Installing server dependencies..."
        Set-Location $(SERVER_DIR)
        if (Test-Path package-lock.json) { npm ci } else { npm install }
      displayName: Install server dependencies

    - powershell: |
        $toolRoot = Join-Path $env:Agent_TempDirectory 'dependency-check'
        $downloadDir = Join-Path $toolRoot 'download'
        $extractDir = Join-Path $toolRoot 'extract'
        $reportDir = "$(OWASP_REPORT_DIR)"

        New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
        New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
        New-Item -ItemType Directory -Force -Path $reportDir | Out-Null

        $bat = Get-ChildItem -Path $extractDir -Recurse -Filter 'dependency-check.bat' -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $bat) {
          Write-Host 'Downloading OWASP Dependency-Check...'
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/jeremylong/DependencyCheck/releases/latest' -Headers @{ 'User-Agent' = 'AzureDevOpsPipeline' }
          $asset = $release.assets | Where-Object { $_.name -match 'dependency-check-.*-release\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            throw 'Could not find a Dependency-Check release zip in the latest GitHub release.'
          }

          $zipPath = Join-Path $downloadDir $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
            New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          }

          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          $bat = Get-ChildItem -Path $extractDir -Recurse -Filter 'dependency-check.bat' -ErrorAction SilentlyContinue | Select-Object -First 1
        }

        if (-not $bat) {
          throw 'dependency-check.bat was not found after extraction.'
        }

        $dependencyCheck = $bat.FullName
        Write-Host "Running OWASP Dependency-Check from $dependencyCheck"
        & $dependencyCheck `
          --project 'chat-app' `
          --scan "$(CLIENT_DIR)" `
          --scan "$(SERVER_DIR)" `
          --format 'HTML' `
          --format 'JSON' `
          --out $reportDir `
          --failOnCVSS 7
      displayName: Run OWASP Dependency-Check

    - powershell: |
        Write-Host "Preparing artifact staging directory..."
        $dest = Join-Path "$(Build.ArtifactStagingDirectory)" "$(ARTIFACT_NAME)"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Write-Host "Copying client build output (dist)..."
        $clientDist = Join-Path "$(CLIENT_DIR)" 'dist'
        if (Test-Path $clientDist) { Copy-Item -Path (Join-Path $clientDist '*') -Destination $dest -Recurse -Force }
        Write-Host "Copying server app files..."
        $serverDest = Join-Path $dest 'server'
        New-Item -ItemType Directory -Force -Path $serverDest | Out-Null
        Copy-Item -Path (Join-Path "$(SERVER_DIR)" '*') -Destination $serverDest -Recurse -Force -ErrorAction SilentlyContinue
        $nodeModules = Join-Path $serverDest 'node_modules'
        if (Test-Path $nodeModules) { Remove-Item -Recurse -Force $nodeModules -ErrorAction SilentlyContinue }
      displayName: Prepare artifact

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(ARTIFACT_NAME)'
        ArtifactName: '$(ARTIFACT_NAME)'
        publishLocation: 'Container'
      displayName: Publish artifact

    - task: SonarQubeAnalyze@7
      displayName: Run SonarQube analysis

    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'
      displayName: Publish SonarQube quality gate

    - task: PublishBuildArtifacts@1
      displayName: Publish OWASP report
      inputs:
        PathtoPublish: '$(OWASP_REPORT_DIR)'
        ArtifactName: 'owasp-report'
        publishLocation: 'Container'

